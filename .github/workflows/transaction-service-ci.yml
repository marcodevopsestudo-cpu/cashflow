name: transaction-service-ci

on:
  pull_request:
    paths:
      - "transaction-service/**"
      - "db-migrator/**"
      - ".github/workflows/transaction-service-ci.yml"
  push:
    branches:
      - main
    paths:
      - "transaction-service/**"
      - "db-migrator/**"
      - ".github/workflows/transaction-service-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./transaction-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
