name: consolidation-service-ci-cd

on:
  pull_request:
    paths:
      - "consolidation-service/**"
      - "db-migrator/**"
      - ".github/workflows/consolidation-service-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "consolidation-service/**"
      - "db-migrator/**"
      - ".github/workflows/consolidation-service-ci-cd.yml"

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: func-cashflow-dev-consolidation
  PROJECT_PATH: ./consolidation-service/src/ConsolidationService.Worker/ConsolidationService.Worker.csproj
  PUBLISH_PATH: ./consolidation-service/publish
  TEST_WORKING_DIR: ./consolidation-service
  DB_MIGRATOR_PROJECT_PATH: ./db-migrator/db-migrator.csproj
  MIGRATIONS_PATH: ./consolidation-service/scripts
  KEY_VAULT_NAME: jjs08i-kv-cashflow-dev
  POSTGRES_SECRET_NAME: postgres-connection-string

jobs:
  build-test:
    name: Build and test consolidation-service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TEST_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: false

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  migrate-db:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read Postgres connection string from Key Vault
        shell: bash
        run: |
          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$POSTGRES_SECRET_NAME" \
            --query value -o tsv)

          if [ -z "$CONNECTION_STRING" ]; then
            echo "Postgres connection string secret was not found or is empty."
            exit 1
          fi

          echo "ConnectionStrings__Postgres=$CONNECTION_STRING" >> $GITHUB_ENV

      - name: Restore DB migrator
        run: dotnet restore ${{ env.DB_MIGRATOR_PROJECT_PATH }}

      - name: Run DB migrations
        run: dotnet run --project ${{ env.DB_MIGRATOR_PROJECT_PATH }} -- --migrations-path=${{ env.MIGRATIONS_PATH }}

  deploy:
    name: Deploy consolidation-service to Azure Functions
    runs-on: ubuntu-latest
    needs: migrate-db
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: false

      - name: Restore project
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Clean publish output
        shell: bash
        run: |
          rm -rf "${{ env.PUBLISH_PATH }}"
          mkdir -p "${{ env.PUBLISH_PATH }}"

      - name: Publish worker
        run: >-
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --no-restore
          --output ${{ env.PUBLISH_PATH }}
          /p:UseAppHost=false
          /p:GenerateFunctionsMetadata=true

      - name: Validate publish output
        shell: bash
        run: |
          test -f "${{ env.PUBLISH_PATH }}/host.json" || (echo "host.json not found" && exit 1)
          test -f "${{ env.PUBLISH_PATH }}/worker.config.json" || (echo "worker.config.json not found" && exit 1)
          test -f "${{ env.PUBLISH_PATH }}/functions.metadata" || (echo "functions.metadata not found" && exit 1)
          test -f "${{ env.PUBLISH_PATH }}/extensions.json" || (echo "extensions.json not found" && exit 1)
          test -f "${{ env.PUBLISH_PATH }}/ConsolidationService.Worker.dll" || (echo "ConsolidationService.Worker.dll not found" && exit 1)

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: consolidation-service-publish
          path: ${{ env.PUBLISH_PATH }}

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}
