name: transaction-service-cd

on:
  push:
    branches:
      - main
    paths:
      - "transaction-service/**"
      - "db-migrator/**"
      - ".github/workflows/transaction-service-cd.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  API_PROJECT_PATH: ./transaction-service/src/TransactionService.Api/TransactionService.Api.csproj
  API_PUBLISH_PATH: ./artifacts/transaction-service
  DB_MIGRATOR_PROJECT_PATH: ./db-migrator/db-migrator.csproj
  MIGRATIONS_PATH: ./transaction-service/scripts
  AZURE_FUNCTIONAPP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  POSTGRES_SECRET_NAME: ${{ vars.POSTGRES_SECRET_NAME }}

concurrency:
  group: transaction-service-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            transaction-service/**/*.csproj
            transaction-service/**/*.props
            transaction-service/**/*.sln
            db-migrator/*.csproj

      - name: Restore transaction-service
        run: dotnet restore ./transaction-service/TransactionService.sln

      - name: Build transaction-service
        run: dotnet build ./transaction-service/TransactionService.sln --configuration Release --no-restore

      - name: Test transaction-service
        run: dotnet test ./transaction-service/tests/TransactionService.UnitTests/TransactionService.UnitTests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Restore db-migrator
        run: dotnet restore ./db-migrator/db-migrator.csproj

      - name: Build db-migrator
        run: dotnet build ./db-migrator/db-migrator.csproj --configuration Release --no-restore

  migrate-db:
    runs-on: ubuntu-latest
    needs: build-test
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            transaction-service/**/*.csproj
            transaction-service/**/*.props
            transaction-service/**/*.sln
            db-migrator/*.csproj

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read Postgres connection string from Key Vault
        shell: bash
        run: |
          set -euo pipefail
          CONNECTION_STRING=$(az keyvault secret show             --vault-name "$KEY_VAULT_NAME"             --name "$POSTGRES_SECRET_NAME"             --query value -o tsv)

          echo "ConnectionStrings__Postgres=$CONNECTION_STRING" >> "$GITHUB_ENV"

      - name: Run DB migrations
        run: dotnet run --project ${{ env.DB_MIGRATOR_PROJECT_PATH }} --configuration Release -- --migrations-path=${{ env.MIGRATIONS_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate-db
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            transaction-service/**/*.csproj
            transaction-service/**/*.props
            transaction-service/**/*.sln

      - name: Publish Function App
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ${{ env.API_PUBLISH_PATH }}

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.API_PUBLISH_PATH }}
