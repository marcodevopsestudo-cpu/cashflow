name: infra-ci

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_WORKING_DIR: ./infra/envs/dev

concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate backend.hcl
        shell: bash
        env:
          TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
          TFSTATE_KEY: ${{ vars.TFSTATE_KEY }}
        run: |
          set -euo pipefail
          : "${TFSTATE_RESOURCE_GROUP:?Missing TFSTATE_RESOURCE_GROUP repository variable}"
          : "${TFSTATE_STORAGE_ACCOUNT:?Missing TFSTATE_STORAGE_ACCOUNT repository variable}"
          CONTAINER="${TFSTATE_CONTAINER:-tfstate}"
          KEY="${TFSTATE_KEY:-cashflow/dev/terraform.tfstate}"

          cat > backend.hcl <<EOF
          resource_group_name  = "$TFSTATE_RESOURCE_GROUP"
          storage_account_name = "$TFSTATE_STORAGE_ACCOUNT"
          container_name       = "$CONTAINER"
          key                  = "$KEY"
          use_azuread_auth     = true
          EOF

      - name: Terraform Init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan             -input=false             -out=tfplan             -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"             -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}"             -var="github_owner=${{ vars.GITHUB_OWNER }}"             -var="github_repo=${{ vars.GITHUB_REPO }}"             -var="github_branch=${{ vars.GITHUB_BRANCH }}"             -var="postgres_admin_username=${{ secrets.POSTGRES_ADMIN_USERNAME }}"             -var="postgres_admin_password=${{ secrets.POSTGRES_ADMIN_PASSWORD }}"

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-dev-tfplan
          path: ${{ env.TERRAFORM_WORKING_DIR }}/tfplan
