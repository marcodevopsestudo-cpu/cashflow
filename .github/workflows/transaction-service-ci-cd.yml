name: transaction-service-ci-cd

on:
  pull_request:
    paths:
      - "transaction-service/**"
      - "db-migrator/**"
      - ".github/workflows/transaction-service-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "transaction-service/**"
      - "db-migrator/**"
      - ".github/workflows/transaction-service-ci-cd.yml"

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: func-cashflow-dev-tx
  API_PROJECT_PATH: ./transaction-service/src/TransactionService.Api
  API_PUBLISH_PATH: ./publish # 🔥 CORRIGIDO
  TEST_WORKING_DIR: ./transaction-service
  DB_MIGRATOR_PROJECT_PATH: ./db-migrator
  MIGRATIONS_PATH: ./transaction-service/scripts
  KEY_VAULT_NAME: eazvxb-kv-cashflow-dev
  POSTGRES_SECRET_NAME: postgres-connection-string

jobs:
  build-test:
    name: Build and test transaction-service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TEST_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  migrate-db:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read Postgres connection string from Key Vault
        shell: bash
        run: |
          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$POSTGRES_SECRET_NAME" \
            --query value -o tsv)

          if [ -z "$CONNECTION_STRING" ]; then
            echo "Postgres connection string secret was not found or is empty."
            exit 1
          fi

          echo "ConnectionStrings__Postgres=$CONNECTION_STRING" >> $GITHUB_ENV

      - name: Run DB migrations
        run: dotnet run --project ${{ env.DB_MIGRATOR_PROJECT_PATH }} -- --migrations-path=${{ env.MIGRATIONS_PATH }}

  deploy:
    name: Deploy transaction-service to Azure Functions
    runs-on: ubuntu-latest
    needs: migrate-db
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --output ${{ env.API_PUBLISH_PATH }}

      # 🔍 DEBUG (ESSENCIAL PRA VALIDAR)
      - name: List publish output
        run: ls -la ${{ env.API_PUBLISH_PATH }}

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.API_PUBLISH_PATH }}
