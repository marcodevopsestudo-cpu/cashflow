name: infra-cd

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infra-cd.yml"

permissions:
  id-token: write
  contents: read

env:
  TERRAFORM_WORKING_DIR: ./infra/envs/dev

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="github_owner=${{ vars.GITHUB_OWNER }}" \
            -var="github_repo=${{ vars.GITHUB_REPO }}" \
            -var="github_branch=${{ vars.GITHUB_BRANCH }}" \
            -var="postgres_admin_username=${{ secrets.POSTGRES_ADMIN_USERNAME }}" \
            -var="postgres_admin_password=${{ secrets.POSTGRES_ADMIN_PASSWORD }}"
